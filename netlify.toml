# -----------------------------------------------
# Netlify Config — URL Rewrite + Folder Protection
# -----------------------------------------------

# 1. Rewrite /preview/projectname → /projects/projectname (silently)
#    Customers see /preview/... in their browser, never /projects/
[[redirects]]
  from = "/preview/:project"
  to = "/projects/:project"
  status = 200

# 2. Block direct access to /projects/ folder
#    Anyone trying to visit /projects/... gets sent to 404
[[redirects]]
  from = "/projects/*"
  to = "/404"
  status = 301
  force = true